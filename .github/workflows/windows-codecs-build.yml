name: Windows QtWebEngine codecs (build phase)

# Reusable build. phase = probe | warm | finish.
#   probe  : configure + ~15 min of build, then report whether Chromium's GN
#            args.gn got cc_wrapper (i.e. sccache is really in the loop) and the
#            sccache stats. Fast wiring check.
#   warm   : build up to a soft budget, stop the tree cleanly (exit success) so
#            its sccache entries persist for finish.
#   finish : build to completion with the warm cache, install, upload.
on:
  workflow_call:
    inputs:
      qt_version: { required: true, type: string }
      phase:      { required: true, type: string }

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 345
    env:
      # Use sccache's plain local-disk cache (SCCACHE_DIR), NOT its built-in
      # GitHub Actions backend: that backend talks to the legacy cache API
      # (artifactcache.actions.githubusercontent.com), which GitHub has
      # decommissioned — it 503s and sccache's server never starts, so nothing
      # is cached. The disk cache is persisted with actions/cache@v4 (which uses
      # the current cache service) in the step below. Keep the cap under
      # GitHub's ~10 GB per-repo Actions-cache limit so the warm -> finish
      # hand-off actually fits.
      SCCACHE_CACHE_SIZE: '8G'
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
    steps:
      - name: Install base Qt ${{ inputs.qt_version }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: win64_msvc2022_64
          modules: 'qtwebchannel qtpositioning'
          cache: true

      - name: Install build tooling (nasm, flex/bison, gperf, node)
        shell: pwsh
        run: |
          choco install -y ninja gperf nodejs-lts python3 nasm winflexbison3 --no-progress
          pip install html5lib
          "$env:ProgramFiles\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append
          "${env:ProgramFiles(x86)}\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append
          $wfb = (Get-Command win_flex.exe -ErrorAction SilentlyContinue).Source
          if ($wfb) {
            $dir = Split-Path $wfb
            Copy-Item "$dir\win_flex.exe"  "$dir\flex.exe"  -Force
            Copy-Item "$dir\win_bison.exe" "$dir\bison.exe" -Force
          }

      - name: Install the Windows 11 SDK (10.0.26100)
        shell: pwsh
        run: |
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\setup.exe"
          $vs = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $installer modify --installPath $vs `
            --add Microsoft.VisualStudio.Component.Windows11SDK.26100 `
            --quiet --norestart --nocache --force
          Get-Process -Name setup, vs_installer -ErrorAction SilentlyContinue |
            Wait-Process -Timeout 1200 -ErrorAction SilentlyContinue
          if (-not (Test-Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0")) {
            throw "SDK 10.0.26100 not installed"
          }

      - name: Set up MSVC 2022 + SDK 26100 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          sdk: '10.0.26100.0'
          vsversion: '2022'

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Restore the sccache disk cache
        # Persist SCCACHE_DIR across runs (and across the warm -> finish jobs)
        # via the current cache service. Per-run key so every run saves a fresh
        # entry; restore-keys prefer a prior finish, then warm, then any, so
        # finish inherits what warm built and each run warms the next.
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.sccache
          key: sccache-winwe-${{ inputs.qt_version }}-${{ inputs.phase }}-${{ github.run_id }}
          restore-keys: |
            sccache-winwe-${{ inputs.qt_version }}-finish-
            sccache-winwe-${{ inputs.qt_version }}-warm-
            sccache-winwe-${{ inputs.qt_version }}-

      - name: Fetch QtWebEngine source (shallow git; fast on Windows)
        shell: pwsh
        run: |
          # On Windows, extracting the everywhere-src .tar.xz (~400k Chromium
          # files) under Defender takes hours; a shallow git clone + shallow
          # submodules is ~5 min, so use that here. (The local Linux script uses
          # the tar.xz, which extracts fast on ext4.)
          $ver = "${{ inputs.qt_version }}"
          git clone --depth 1 --branch "v$ver" `
            https://code.qt.io/qt/qtwebengine.git qtwebengine
          if ($LASTEXITCODE -ne 0) { throw "git clone failed" }
          cd qtwebengine
          git submodule update --init --recursive --depth 1
          if ($LASTEXITCODE -ne 0) { throw "submodule checkout failed" }

      - name: Configure (Release, codecs ON, sccache as cc_wrapper)
        shell: pwsh
        run: |
          $src = "$pwd\qtwebengine"
          New-Item -ItemType Directory -Force build-we | Out-Null
          cd build-we
          # Qt maps CMAKE_<LANG>_COMPILER_LAUNCHER to Chromium's GN cc_wrapper,
          # which is what routes the Chromium compile through sccache.
          & "$env:QT_ROOT_DIR\bin\qt-configure-module.bat" $src `
            -- -DCMAKE_BUILD_TYPE=Release `
               -DCMAKE_C_COMPILER_LAUNCHER=sccache `
               -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
               -DQT_FEATURE_webengine_proprietary_codecs=ON `
               -DQT_FEATURE_qtpdf_build=OFF
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }

      - name: Build (phase-aware)
        shell: pwsh
        run: |
          cd build-we
          $phase = "${{ inputs.phase }}"
          $softMin = switch ($phase) { 'probe' { 15 } 'warm' { 285 } default { 330 } }
          $p = Start-Process cmake -ArgumentList '--build','.','--parallel' -NoNewWindow -PassThru
          $deadline = (Get-Date).AddMinutes($softMin)
          $stopped = $false
          while (-not $p.HasExited) {
            Start-Sleep -Seconds 20
            if ((Get-Date) -gt $deadline) {
              Write-Host "$phase reached the $softMin-min budget; stopping the build tree"
              & taskkill.exe /F /T /PID $p.Id 2>$null
              $stopped = $true
              break
            }
          }
          $code = -1
          if ($p.HasExited) { $code = $p.ExitCode }
          Write-Host "build step done: stopped=$stopped exit=$code"
          if (-not $stopped -and $phase -eq 'finish' -and $code -ne 0) {
            throw "finish build failed (exit $code)"
          }

      - name: Diagnostics — is sccache wired into Chromium?
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== args.gn cc_wrapper lines (should mention sccache) ==="
          $found = $false
          Get-ChildItem -Recurse -Filter args.gn build-we -ErrorAction SilentlyContinue |
            ForEach-Object {
              $m = Select-String -Path $_.FullName -Pattern 'cc_wrapper'
              if ($m) { $found = $true; Write-Host "$($_.FullName): $($m.Line.Trim())" }
            }
          if (-not $found) { Write-Host "NO cc_wrapper in any args.gn — Chromium is NOT using sccache" }
          Write-Host "=== sccache stats ==="
          sccache --show-stats

      - name: Install
        if: ${{ inputs.phase == 'finish' }}
        shell: pwsh
        run: |
          cd build-we
          cmake --install .

      - name: Upload built module
        if: ${{ inputs.phase == 'finish' }}
        uses: actions/upload-artifact@v4
        with:
          name: qtwebengine-codecs-${{ inputs.qt_version }}
          path: |
            build-we/**/QtWebEngineCore.dll
            build-we/**/QtWebEngineProcess.exe
            build-we/**/libEGL.dll
            build-we/**/libGLESv2.dll
            build-we/**/*.pak
            build-we/**/icudtl.dat
          if-no-files-found: warn
