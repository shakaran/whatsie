name: Release Artifacts

# On a version tag, build the Windows app and attach it to that GitHub release.
# The release itself is created separately (gh release create / the Release
# workflow); this only uploads binaries to it.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the build to (e.g. v6.0.0)'
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    # Optional Windows code signing via the SignPath Foundation free OSS program
    # (issue #325). Everything below is a no-op until the SIGNPATH_API_TOKEN
    # secret and SIGNPATH_ORGANIZATION_ID variable are set; see
    # packaging/windows-signing.md for the one-time application and setup.
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          arch: win64_msvc2022_64
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Configure
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        run: '& "$env:QT_ROOT_DIR\bin\windeployqt.exe" build\Release\whatly.exe'

      # ── Optional: code-sign the built .exe via SignPath (issue #325) ──────────
      # Skipped entirely unless SIGNPATH_API_TOKEN is configured. When it is, the
      # unsigned .exe is uploaded, signed by SignPath's cloud, and the signed
      # copy is written back over build\Release\whatly.exe before it is packaged.
      - name: Upload unsigned .exe for signing
        if: env.SIGNPATH_API_TOKEN != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: whatly-unsigned-exe
          path: build/Release/whatly.exe

      - name: Code-sign with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: whatly
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: build/Release

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag) { $tag = "${{ github.ref_name }}" }
          $name = "whatly-$($tag.TrimStart('v'))-windows-x64.zip"
          Rename-Item build\Release whatly-windows-x64
          Compress-Archive -Path build\whatly-windows-x64 -DestinationPath $name
          echo "ASSET=$name" >> $env:GITHUB_ENV

      - name: Attach to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$tag" --repo $env:GITHUB_REPOSITORY --title "$tag" --generate-notes
          }
          gh release upload "$tag" "$env:ASSET" --clobber --repo $env:GITHUB_REPOSITORY

  # ── Flatpak ────────────────────────────────────────────────────────────────
  # Built inside the KDE 6.9 flatpak SDK image; the manifest's git source is
  # swapped for the checked-out tree so CI always packages the pushed commit.
  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install flatpak-builder + the KDE 6.9 runtime
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build the checked-out tree
        run: |
          # Package the pushed commit, not the manifest's pinned git tag.
          python3 - <<'PY'
          import re
          p = "packaging/flatpak/net.shakaran.whatly.yml"
          t = open(p).read()
          t = re.sub(r'(?s)    sources:.*$',
                     "    sources:\n      - type: dir\n        path: ../../\n", t)
          open(p, "w").write(t)
          PY
          flatpak-builder --user --install-deps-from=flathub --disable-rofiles-fuse \
            --repo=fp-repo --force-clean fp-build \
            packaging/flatpak/net.shakaran.whatly.yml
          flatpak build-bundle fp-repo whatly.flatpak net.shakaran.whatly

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes || true
          gh release upload "$tag" whatly.flatpak --clobber --repo "$GITHUB_REPOSITORY"

  # ── AppImage (+ .zsync delta updates) ───────────────────────────────────────
  appimage:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1   # runners have no FUSE
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          # qtserialport: the qtpositioning nmea plugin links it, and
          # linuxdeploy-plugin-qt fails to deploy without the library present.
          modules: 'qtwebengine qtwebchannel qtpositioning qtserialport'
          cache: true

      - name: Build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build libx11-dev libxcb1-dev libfuse2

      - name: Build and install into AppDir
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --parallel
          DESTDIR="$PWD/AppDir" cmake --install build

      - name: Package AppImage
        run: |
          base=https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous
          qtbase=https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous
          wget -q "$base/linuxdeploy-x86_64.AppImage"
          wget -q "$qtbase/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export UPDATE_INFORMATION="gh-releases-zsync|shakaran|whatly|latest|Whatly-*-x86_64.AppImage.zsync"
          export OUTPUT="Whatly-${tag#v}-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/net.shakaran.whatly.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/net.shakaran.whatly.png \
            --plugin qt --output appimage

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes || true
          gh release upload "$tag" Whatly-*-x86_64.AppImage Whatly-*-x86_64.AppImage.zsync --clobber --repo "$GITHUB_REPOSITORY"

  # ── .deb and .rpm (Qt bundled under /opt/whatly, built with fpm) ─────────────
  # The app needs Qt 6.10, which stable distros do not ship, so — like the
  # AppImage/Flatpak/snap — Qt is bundled. The package installs the app under
  # /opt/whatly (RPATH-relocated by linuxdeploy) with a /usr/bin/whatly symlink
  # and the desktop entry + icon in /usr/share, so it works on any distro.
  # Standalone job: a failure here never blocks the other artifacts.
  packages:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          modules: 'qtwebengine qtwebchannel qtpositioning qtserialport'
          cache: true

      - name: Build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build libx11-dev libxcb1-dev libfuse2 \
            ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Build and bundle into AppDir
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --parallel
          DESTDIR="$PWD/AppDir" cmake --install build
          qtbase=https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous
          base=https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous
          wget -q "$base/linuxdeploy-x86_64.AppImage"
          wget -q "$qtbase/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          # Populate AppDir with the bundled Qt runtime (RPATH => $ORIGIN/../lib).
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/net.shakaran.whatly.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/net.shakaran.whatly.png \
            --plugin qt

      - name: Stage the package tree
        run: |
          rm -rf pkg
          mkdir -p pkg/opt/whatly pkg/usr/bin pkg/usr/share/applications \
            pkg/usr/share/icons/hicolor/256x256/apps
          cp -a AppDir/usr/. pkg/opt/whatly/
          ln -sf /opt/whatly/bin/whatly pkg/usr/bin/whatly
          # Desktop entry + icon at the system locations, pointing into /opt.
          sed 's|^Exec=whatly|Exec=/opt/whatly/bin/whatly|' \
            AppDir/usr/share/applications/net.shakaran.whatly.desktop \
            > pkg/usr/share/applications/net.shakaran.whatly.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/net.shakaran.whatly.png \
            pkg/usr/share/icons/hicolor/256x256/apps/ || true

      - name: Verify the bundled Qt WebEngine runtime is complete
        run: |
          # A relocated Qt WebEngine that is missing its helper process or its
          # resource/locale data aborts (SIGTRAP) on the first page load — the
          # class of crash reported in issue #3. Fail the build here rather than
          # shipping a package that cannot render anything.
          root=pkg/opt/whatly
          fail=0
          need_file() {
            if ! find "$root" -name "$1" -print -quit | grep -q .; then
              echo "::error::missing from the bundle: $1"
              fail=1
            else
              echo "ok: $1 -> $(find "$root" -name "$1" -print -quit)"
            fi
          }
          need_file QtWebEngineProcess
          need_file icudtl.dat
          need_file qtwebengine_resources.pak
          # At least one localised .pak must be present.
          if ! find "$root" -path '*qtwebengine_locales*.pak' -print -quit | grep -q .; then
            echo "::error::missing from the bundle: qtwebengine_locales/*.pak"
            fail=1
          else
            echo "ok: qtwebengine_locales/*.pak present"
          fi
          exit $fail

      - name: Build .deb and .rpm
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          common=(-s dir -n whatly -v "$ver" --license MIT \
            --description "Feature-rich WhatsApp Web desktop client (Qt WebEngine)" \
            --url "https://github.com/shakaran/whatly" \
            --maintainer "Angel Guzman Maeso <angel@guzmanmaeso.com>" \
            -C pkg --force)
          fpm "${common[@]}" -t deb \
            -d libglib2.0-0 -d libnss3 -d libxcomposite1 -d libxdamage1 \
            -d libxrandr2 -d libxkbcommon0 -d libasound2 \
            -p "whatly_${ver}_amd64.deb" opt usr
          fpm "${common[@]}" -t rpm \
            -d glib2 -d nss -d libXcomposite -d libXdamage -d libXrandr \
            -d libxkbcommon -d alsa-lib \
            -p "whatly-${ver}-1.x86_64.rpm" opt usr

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes || true
          gh release upload "$tag" whatly_*_amd64.deb whatly-*.x86_64.rpm --clobber --repo "$GITHUB_REPOSITORY"
