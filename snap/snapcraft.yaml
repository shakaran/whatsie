name: whatly
adopt-info: whatly-build-src

grade: stable
confinement: strict
base: core24
compression: lzo

title: Whatly
contact: https://github.com/shakaran/whatly/issues
website: https://github.com/shakaran/whatly
source-code: https://github.com/shakaran/whatly
issues: https://github.com/shakaran/whatly/issues
license: MIT
donation:
  - https://ko-fi.com/shakaran
  - https://wise.com/pay/me/angelg1148
  - https://www.paypal.me/shakaran

icon: snap/gui/icon.svg

platforms:
  amd64:
  arm64:

# The hunspell-dictionaries content snap used to be mounted here, with DICPATH
# pointing at it. It could never have worked: Qt WebEngine's spell checker is
# Chromium's, and Chromium reads .bdic — it cannot read hunspell's .dic/.aff.
# The dictionaries are converted at build time and shipped inside the snap
# instead (see CMakeLists.txt), so there is nothing to mount.

apps:
  whatly:
    command: usr/bin/whatly
    desktop: usr/share/applications/net.shakaran.whatly.desktop
    common-id: net.shakaran.whatly
    extensions:
      - kde-neon-6
    plugs:
      - home
      - desktop
      - desktop-legacy
      - opengl
      - x11
      - wayland
      - network
      - unity7
      - browser-support
      - network-status
      - camera
      - audio-playback
      - audio-record
      - removable-media
      - screen-inhibit-control
      - hardware-observe
      - network-observe
      - network-bind
      - mount-observe


parts:
  whatly-build-src:
    plugin: cmake
    source: .
    parse-info:
      - dist/linux/net.shakaran.whatly.appdata.xml
    build-snaps:
      - cmake/latest/stable
    build-packages:
      - libxkbcommon-dev
      - libdrm-dev
      # Provides qwebengine_convert_dict, which the build uses to turn the
      # hunspell dictionaries into the .bdic format Qt WebEngine needs. Without
      # it the build stops with an error rather than shipping a spell checker
      # that silently does nothing.
      - qt6-webengine-dev-tools

    stage-packages:
      - libdrm2
      # libqxcb links against it, and without it the snap does not start at all.
      - libxcb-shape0

    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr

    override-build: |
      craftctl default

      mkdir -p ${CRAFT_PART_INSTALL}/meta/gui
      cp ${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/apps/net.shakaran.whatly.png \
        ${CRAFT_PART_INSTALL}/meta/gui/icon.png

      sed -i \
        "s|^Icon=.*|Icon=\${SNAP}/meta/gui/icon.png|" \
        ${CRAFT_PART_INSTALL}/usr/share/applications/net.shakaran.whatly.desktop

    prime:
      - -usr/bug
      - -usr/doc
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/share/ECM
      - -usr/share/man
      - -usr/share/lintian
