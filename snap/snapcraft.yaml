name: whatsie
adopt-info: whatsie-build-src

grade: stable
confinement: strict
base: core24
compression: lzo

icon: snap/gui/icon.svg

platforms:
  amd64:
  arm64:

# The hunspell-dictionaries content snap used to be mounted here, with DICPATH
# pointing at it. It could never have worked: Qt WebEngine's spell checker is
# Chromium's, and Chromium reads .bdic — it cannot read hunspell's .dic/.aff.
# The dictionaries are converted at build time and shipped inside the snap
# instead (see CMakeLists.txt), so there is nothing to mount.

apps:
  whatsie:
    command: usr/bin/whatsie
    desktop: usr/share/applications/net.shakaran.whatsie.desktop
    common-id: net.shakaran.whatsie
    extensions:
      - kde-neon-6
    plugs:
      - home
      - desktop
      - desktop-legacy
      - opengl
      - x11
      - wayland
      - network
      - unity7
      - browser-support
      - network-status
      - camera
      - audio-playback
      - audio-record
      - removable-media
      - screen-inhibit-control
      - hardware-observe
      - network-observe
      - network-bind
      - mount-observe


parts:
  whatsie-build-src:
    plugin: cmake
    source: .
    parse-info:
      - dist/linux/net.shakaran.whatsie.appdata.xml
    build-snaps:
      - cmake/latest/stable
    build-packages:
      - libxkbcommon-dev
      - libdrm-dev

    stage-packages:
      - libdrm2
      # libqxcb links against it, and without it the snap does not start at all.
      - libxcb-shape0

    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr

    override-build: |
      craftctl default

      mkdir -p ${CRAFT_PART_INSTALL}/meta/gui
      cp ${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/apps/net.shakaran.whatsie.png \
        ${CRAFT_PART_INSTALL}/meta/gui/icon.png

      sed -i \
        "s|^Icon=.*|Icon=\${SNAP}/meta/gui/icon.png|" \
        ${CRAFT_PART_INSTALL}/usr/share/applications/net.shakaran.whatsie.desktop

    prime:
      - -usr/bug
      - -usr/doc
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/share/ECM
      - -usr/share/man
      - -usr/share/lintian
