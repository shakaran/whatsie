<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata for the source file only; the runtime ignores it -->
  </head>
  <body>
    <template>
      <style>
@font-face{font-family:'DejaVu Sans';src:local('DejaVu Sans'),local('DejaVu Sans Book');font-weight:400;font-style:normal}@font-face{font-family:'DejaVu Sans';src:local('DejaVu Sans Bold');font-weight:700;font-style:normal}

        /* Root styled by #root (never a class) — the scoper drops a root class.
           Note: authored ids are prefixed "04-scheduled-" for cross-frame
           uniqueness, but a CSS/JS selector token cannot start with a digit,
           so they are referenced via [id="…"] attribute selectors throughout. */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "DejaVu Sans", sans-serif;
        }

        /* Full-bleed teal ground — a dedicated clip layer, NOT a background on #root. */
        [id="04-scheduled-bg"] {
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, #0d9488 0%, #0a6f66 48%, #064e46 100%);
        }

        /* Camera group — the push-in hold scales this whole layer. */
        [id="04-scheduled-cam"] {
          position: absolute;
          inset: 0;
          transform-origin: 50% 50%;
          will-change: transform;
        }

        /* Cropped dialog window presented as a floating card. */
        [id="04-scheduled-dialog"] {
          position: absolute;
          left: 150px;
          top: 192px;
          width: 758px;
          height: 660px;
          overflow: hidden;
          border-radius: 16px;
          box-shadow: 0 40px 90px rgba(3, 40, 36, 0.55),
            0 8px 24px rgba(3, 40, 36, 0.4);
          transform-origin: 50% 60%;
          will-change: transform, opacity;
        }
        [id="04-scheduled-dialog"] img {
          position: absolute;
          left: -98px;
          top: -88px;
          width: 1487px;
          height: 837px;
          display: block;
        }

        /* Right-hand kinetic copy column. */
        [id="04-scheduled-title"] {
          position: absolute;
          left: 968px;
          top: 262px;
          width: 852px;
          color: #ffffff;
          font-weight: 700;
          font-size: 132px;
          line-height: 0.98;
          letter-spacing: -0.02em;
        }
        [id="04-scheduled-t1"],
        [id="04-scheduled-t2"] {
          display: block;
          will-change: transform, filter, opacity;
        }
        [id="04-scheduled-t2"] {
          color: #2dd4bf;
        }

        [id="04-scheduled-accent"] {
          position: absolute;
          left: 972px;
          top: 548px;
          width: 176px;
          height: 9px;
          border-radius: 6px;
          background: #2dd4bf;
          transform-origin: 0% 50%;
          will-change: transform;
        }

        [id="04-scheduled-sub"] {
          position: absolute;
          left: 972px;
          top: 596px;
          width: 812px;
          color: rgba(255, 255, 255, 0.92);
          font-weight: 400;
          font-size: 50px;
          line-height: 1.4;
          letter-spacing: 0.005em;
        }
        [id="04-scheduled-sub"] .sched-w {
          display: inline-block;
          opacity: 0;
          margin-right: 0.28em;
          will-change: opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="04-scheduled"
        data-width="1920"
        data-height="1080"
       data-start="0" data-duration="3.4">
        <div
          id="04-scheduled-bg"
          class="clip"
          data-start="0"
          data-duration="3.4"
          data-track-index="0"
        ></div>

        <div id="04-scheduled-cam">
          <div
            id="04-scheduled-dialog"
            class="clip"
            data-start="0"
            data-duration="3.4"
            data-track-index="1"
          >
            <img
              src="assets/card-scheduled.png"
              alt="Scheduled messages dialog"
              data-layout-allow-overflow
            />
          </div>

          <div
            id="04-scheduled-title"
            class="clip"
            data-start="0"
            data-duration="3.4"
            data-track-index="2"
          >
            <span id="04-scheduled-t1">Schedule</span>
            <span id="04-scheduled-t2">messages</span>
          </div>

          <div
            id="04-scheduled-accent"
            class="clip"
            data-start="0"
            data-duration="3.4"
            data-track-index="3"
          ></div>

          <div
            id="04-scheduled-sub"
            class="clip"
            data-start="0"
            data-duration="3.4"
            data-track-index="4"
          >
            <span class="sched-w">sent</span><span class="sched-w">even</span><span class="sched-w">if</span><span class="sched-w">the</span><span class="sched-w">app</span><span class="sched-w">was</span><span class="sched-w">closed</span>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // [0.0–0.8] Dialog rises from the lower third —
        // vertical-spring-ticker "click" (back.out) + spring-pop entrance.
        // fromTo so a seek to t=0 lands the collapsed/off state exactly.
        tl.fromTo(
          '[id="04-scheduled-dialog"]',
          { y: 248, scale: 0.9, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.4)" },
          0,
        );

        // [0.8–1.5] "Schedule messages" slams in — kinetic-beat-slam.
        // Distinct entrance per line (scale+blur hit, then a rising snap).
        tl.fromTo(
          '[id="04-scheduled-t1"]',
          { scale: 1.32, filter: "blur(14px)", opacity: 0 },
          { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "power4.out" },
          0.85,
        );
        tl.fromTo(
          '[id="04-scheduled-t2"]',
          { y: 88, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.6)" },
          1.1,
        );

        // Accent underline sweeps in beneath the title (finale chrome).
        tl.fromTo(
          '[id="04-scheduled-accent"]',
          { scaleX: 0 },
          { scaleX: 1, duration: 0.5, ease: "power3.out" },
          1.4,
        );

        // [1.5–2.2] Subtitle reveals word-by-word — discrete-text-sequence:
        // each frame derives the visible-word count from the driver time
        // (deterministic, instant per-word state jumps; no CSS transition).
        const words = gsap.utils.toArray('[id="04-scheduled-sub"] .sched-w');
        const WORD_START = 1.5;
        const WORD_STEP = 0.1;
        const driver = { t: 0 };
        tl.to(
          driver,
          {
            t: 3.4,
            duration: 3.4,
            ease: "none",
            onUpdate: () => {
              const time = driver.t;
              for (let i = 0; i < words.length; i++) {
                words[i].style.opacity =
                  time >= WORD_START + i * WORD_STEP ? "1" : "0";
              }
            },
          },
          0,
        );

        // [2.2–3.4] Soft push-in hold — multi-phase-camera steady push.
        tl.fromTo(
          '[id="04-scheduled-cam"]',
          { scale: 1 },
          { scale: 1.035, duration: 1.2, ease: "sine.inOut" },
          2.2,
        );

        window.__timelines["04-scheduled"] = tl;
      </script>
    </template>
  </body>
</html>
