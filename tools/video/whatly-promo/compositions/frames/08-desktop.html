<template>
  <style>
@font-face{font-family:'DejaVu Sans';src:local('DejaVu Sans'),local('DejaVu Sans Book');font-weight:400;font-style:normal}@font-face{font-family:'DejaVu Sans';src:local('DejaVu Sans Bold');font-weight:700;font-style:normal}

    /* ---- Frame 8 — Tray & notifications ---------------------------------- */
    /* class prefix is `f08-desktop-` (leading letter: a CSS class/selector may
       not start with a digit, so a bare `08-desktop-` prefix would be invalid). */
    #root {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "DejaVu Sans", sans-serif;
      background: transparent;
    }

    /* Full-bleed teal ground (a clip layer, never on #root) */
    .f08-desktop-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(120% 90% at 50% 8%, rgba(45, 212, 191, 0.22), rgba(45, 212, 191, 0) 55%),
        linear-gradient(135deg, #0d9488 0%, #0a6d63 45%, #064e46 100%);
    }
    .f08-desktop-bg::after {
      /* faint dot-grid atmosphere */
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px);
      background-size: 46px 46px;
      opacity: 0.6;
    }

    /* Camera wrapper — carries the slow push-in hold */
    .f08-desktop-cam {
      position: absolute;
      inset: 0;
    }

    /* Eyebrow */
    .f08-desktop-eyebrow {
      position: absolute;
      top: 88px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2dd4bf;
      will-change: transform, opacity;
    }

    /* Card depth-cloud stage */
    .f08-desktop-stage {
      position: absolute;
      left: 0;
      top: 188px;
      width: 100%;
      height: 452px;
      perspective: 1500px;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .f08-desktop-frag {
      position: absolute;
      top: 50%;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }
    .f08-desktop-card {
      display: block;
      width: 760px;
      height: 428px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 34px 80px rgba(3, 32, 29, 0.55);
      background: #063e39;
    }
    .f08-desktop-label {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #ffffff;
      background: rgba(6, 62, 57, 0.55);
      border: 1px solid rgba(45, 212, 191, 0.4);
      padding: 8px 20px;
      border-radius: 100px;
      white-space: nowrap;
      will-change: transform, opacity;
    }

    /* Title block */
    .f08-desktop-title {
      position: absolute;
      left: 0;
      top: 686px;
      width: 100%;
      text-align: center;
    }
    .f08-desktop-title-1 {
      font-size: 66px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #ffffff;
      will-change: transform, opacity, filter;
    }
    .f08-desktop-title-2 {
      margin-top: 14px;
      font-size: 34px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #2dd4bf;
      will-change: transform, opacity;
    }
  </style>

  <div id="root" data-composition-id="08-desktop" data-width="1920" data-height="1080" data-start="0" data-duration="3.5">
    <div class="f08-desktop-bg clip" data-start="0" data-duration="3.5" data-track-index="0"></div>

    <div class="f08-desktop-cam clip" data-start="0" data-duration="3.5" data-track-index="1">
      <div class="f08-desktop-eyebrow">DESKTOP-NATIVE</div>

      <div class="f08-desktop-stage">
        <div class="f08-desktop-frag" data-target-x="-412" data-target-y="0">
          <img class="f08-desktop-card" src="assets/card-tray.png" alt="" />
          <div class="f08-desktop-label">System tray &amp; watchdog</div>
        </div>
        <div class="f08-desktop-frag" data-target-x="412" data-target-y="0">
          <img class="f08-desktop-card" src="assets/card-notifications.png" alt="" />
          <div class="f08-desktop-label">Native notifications</div>
        </div>
      </div>

      <div class="f08-desktop-title">
        <div class="f08-desktop-title-1">A real desktop citizen</div>
        <div class="f08-desktop-title-2">tray &middot; notifications &middot; watchdog</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var stage = document.querySelector(".f08-desktop-stage");
      var frags = Array.prototype.slice.call(
        document.querySelectorAll(".f08-desktop-frag")
      );
      var labels = Array.prototype.slice.call(
        document.querySelectorAll(".f08-desktop-label")
      );
      var n = frags.length;

      // ---- depth-scatter-assemble (two-up, short-path-into-slot form) -----
      var GOLDEN = Math.PI * (3 - Math.sqrt(5)); // ~2.39943 — even, deterministic
      var RADIUS = 150;   // gentle in-plane offset around each card's own slot
      var Z_NEAR = 300;
      var Z_FAR = -240;
      var TUMBLE = 46;    // capped (< 80) — content lives on the card face
      var ASSEMBLE_DUR = 0.82;
      var STAGGER = 0.12;

      // Precompute each fragment's deterministic scattered state from its index.
      var scatter = frags.map(function (el, i) {
        var a = i * GOLDEN;
        var depthT = n > 1 ? i / (n - 1) : 0;
        var tx = Number(el.getAttribute("data-target-x"));
        var ty = Number(el.getAttribute("data-target-y"));
        return {
          x: tx + Math.cos(a) * RADIUS,
          y: ty + Math.sin(a) * RADIUS,
          z: Z_NEAR - depthT * (Z_NEAR - Z_FAR),
          rotationX: Math.sin(a) * TUMBLE,
          rotationY: Math.cos(a) * TUMBLE,
        };
      });

      // Park every fragment in the cloud BEFORE any tween fires.
      frags.forEach(function (el, i) {
        var s = scatter[i];
        gsap.set(el, {
          xPercent: -50,
          yPercent: -50,
          x: s.x,
          y: s.y,
          z: s.z,
          rotationX: s.rotationX,
          rotationY: s.rotationY,
          opacity: 0,
        });
      });

      // Gentle cloud-stage spin so the scatter has life before it locks.
      tl.fromTo(
        stage,
        { rotationY: -6 },
        { rotationY: 0, duration: 1.0, ease: "power1.out" },
        0
      );

      // ASSEMBLE — each card flies from its cloud point to its flat slot.
      frags.forEach(function (el, i) {
        tl.to(
          el,
          {
            x: Number(el.getAttribute("data-target-x")),
            y: Number(el.getAttribute("data-target-y")),
            z: 0,
            rotationX: 0,
            rotationY: 0,
            opacity: 1,
            duration: ASSEMBLE_DUR,
            ease: "power3.out",
          },
          i * STAGGER
        );
      });

      // Eyebrow — quiet fill above the array.
      tl.fromTo(
        ".f08-desktop-eyebrow",
        { y: -16, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
        0.3
      );

      // Card labels reveal as the cards seat.
      labels.forEach(function (el, i) {
        tl.fromTo(
          el,
          { y: 14, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
          0.66 + i * 0.1
        );
      });

      // ---- kinetic-beat-slam — title lands on the beat --------------------
      var BEATS = [1.0, 1.3]; // within the storyboard 1.0–1.6 window
      tl.fromTo(
        ".f08-desktop-title-1",
        { scale: 1.35, filter: "blur(12px)", opacity: 0 },
        { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "power4.out" },
        BEATS[0]
      );
      tl.fromTo(
        ".f08-desktop-title-2",
        { x: -260, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.45, ease: "expo.out" },
        BEATS[1]
      );

      // ---- gentle push-in hold (1.5s → end) ------------------------------
      tl.fromTo(
        ".f08-desktop-cam",
        { scale: 1 },
        { scale: 1.035, duration: 1.5, ease: "sine.inOut" },
        1.5
      );

      window.__timelines["08-desktop"] = tl;
    })();
  </script>
</template>
