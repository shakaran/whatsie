  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      window.__timelines = window.__timelines || {};

      // ── 3d-text-depth-layers: build translucent extrusion behind the title ──
      var TITLE = "A native desktop window";
      var stack = document.getElementById("f-02-hero-dark-titlestack");
      var LAYER_COUNT = 5;      // front + 4 back plates
      var OFFSET_X = 2;         // (+x,+y) => light from upper-left, kept consistent
      var OFFSET_Y = 3;
      var BACK_HUE = "3, 45, 41";
      var BACK_ALPHA_MAX = 0.8;
      var BACK_ALPHA_STEP = 0.14;
      var BACK_ALPHA_MIN = 0.16;
      // insert back layers behind the existing front line (i=0)
      for (var i = LAYER_COUNT - 1; i >= 1; i--) {
        var el = document.createElement("div");
        el.className = "f-02-hero-dark-tline is-back";
        el.textContent = TITLE;
        var alpha = Math.max(BACK_ALPHA_MAX - i * BACK_ALPHA_STEP, BACK_ALPHA_MIN);
        el.style.color = "rgba(" + BACK_HUE + ", " + alpha + ")";
        el.style.transform = "translate(" + (i * OFFSET_X) + "px, " + (i * OFFSET_Y) + "px)";
        stack.insertBefore(el, stack.firstChild);
      }

      var tl = gsap.timeline({ paused: true });

      // ── orbit-3d-entry (entry phase): the window flies in from depth ──
      // Z push from far + -12deg Y-rotation, settling flat. fromTo => hero is
      // visible well before t=0.5s (back/power ease is front-loaded).
      tl.fromTo(
        "#f-02-hero-dark-cardwrap",
        { rotationY: -12, z: -640, scale: 0.68, y: 46, opacity: 0 },
        { rotationY: 0, z: 0, scale: 1, y: 0, opacity: 1, duration: 0.7, ease: "back.out(1.3)" },
        0
      );

      // ── kinetic-beat-slam: title slams in top-left on the beat ──
      var BEAT = 0.85;
      tl.fromTo(
        "#f-02-hero-dark-titlestack",
        { scale: 1.34, filter: "blur(14px)", opacity: 0, y: -12 },
        { scale: 1, filter: "blur(0px)", opacity: 1, y: 0, duration: 0.5, ease: "power4.out" },
        BEAT
      );
      // finale: accent underline sweeps in on the next sub-beat
      tl.fromTo(
        "#f-02-hero-dark-underline",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
        BEAT + 0.18
      );

      // ── multi-phase-camera: slow 1.0 -> 1.04 push + continuous micro-drift ──
      var camera = document.getElementById("f-02-hero-dark-camera");
      var phase = { scale: 1.0 };
      tl.to(phase, { scale: 1.04, duration: 1.6, ease: "power2.inOut" }, 1.4);

      var drift = { p: 0 };
      tl.to(
        drift,
        {
          p: Math.PI * 2 * 1,
          duration: 3,
          ease: "none",
          onUpdate: function () {
            var dx = Math.sin(drift.p) * 4;
            var dy = Math.sin(drift.p * 1.3) * 2;
            camera.style.transform = "scale(" + phase.scale + ") translate(" + dx + "px, " + dy + "px)";
          }
        },
        0
      );

      // ── depth-of-field-blur: the ground softens as the camera pushes in ──
      // Runs at the SAME position as the push so "the world recedes / we push
      // into the crisp window" reads as one move. The card stays sharp.
      gsap.utils.toArray(".f-02-hero-dark-glow").forEach(function (el) {
        var depth = Number(el.dataset.depth) || 1;
        tl.to(
          el,
          { "--dof": (5 * depth) + "px", opacity: 0.48, duration: 1.6, ease: "power2.inOut" },
          1.4
        );
      });

      window.__timelines["02-hero-dark"] = tl;
    })();
  </script>
