<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="27.8"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-logo"
        class="scene"
        data-composition-id="01-logo"
        data-composition-src="compositions/frames/01-logo.html"
        data-start="0"
        data-duration="3.1"
        data-track-index="0"
      ></div>

      <div
        id="el-02-hero-dark"
        class="scene"
        data-composition-id="02-hero-dark"
        data-composition-src="compositions/frames/02-hero-dark.html"
        data-start="2.6"
        data-duration="3.6"
        data-track-index="1"
      ></div>

      <div
        id="el-03-hero-light"
        class="scene"
        data-composition-id="03-hero-light"
        data-composition-src="compositions/frames/03-hero-light.html"
        data-start="5.6"
        data-duration="3.3"
        data-track-index="0"
      ></div>

      <div
        id="el-04-scheduled"
        class="scene"
        data-composition-id="04-scheduled"
        data-composition-src="compositions/frames/04-scheduled.html"
        data-start="8.399999999999999"
        data-duration="3.4"
        data-track-index="1"
      ></div>

      <div
        id="el-05-themes"
        class="scene"
        data-composition-id="05-themes"
        data-composition-src="compositions/frames/05-themes.html"
        data-start="11.799999999999999"
        data-duration="3.5"
        data-track-index="0"
      ></div>

      <div
        id="el-06-accounts"
        class="scene"
        data-composition-id="06-accounts"
        data-composition-src="compositions/frames/06-accounts.html"
        data-start="14.799999999999999"
        data-duration="3.6"
        data-track-index="1"
      ></div>

      <div
        id="el-07-power"
        class="scene"
        data-composition-id="07-power"
        data-composition-src="compositions/frames/07-power.html"
        data-start="17.799999999999997"
        data-duration="3"
        data-track-index="0"
      ></div>

      <div
        id="el-08-desktop"
        class="scene"
        data-composition-id="08-desktop"
        data-composition-src="compositions/frames/08-desktop.html"
        data-start="20.799999999999997"
        data-duration="3.5"
        data-track-index="1"
      ></div>

      <div
        id="el-09-outro"
        class="scene"
        data-composition-id="09-outro"
        data-composition-src="compositions/frames/09-outro.html"
        data-start="23.799999999999997"
        data-duration="4"
        data-track-index="0"
      ></div>

      <!-- BGM -->
      <audio
        id="el-bgm"
        src="assets/bgm/track.loop.mp3"
        data-start="0"
        data-duration="27.8"
        data-track-index="11"
        data-volume="0.9"
      ></audio>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-logo", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 2.6);
        tl.fromTo("#el-02-hero-dark", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 2.6);
        tl.to("#el-02-hero-dark", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.6, ease: "power2.inOut" }, 5.6);
        tl.fromTo("#el-03-hero-light", { filter: "blur(10px)", scale: 0.97, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 5.6);
        tl.to("#el-03-hero-light", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 8.4);
        tl.fromTo("#el-04-scheduled", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 8.4);
        tl.to("#el-05-themes", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 14.8);
        tl.fromTo("#el-06-accounts", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 14.8);
        tl.to("#el-06-accounts", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.6, ease: "power2.inOut" }, 17.8);
        tl.fromTo("#el-07-power", { filter: "blur(10px)", scale: 0.97, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 17.8);
        tl.to("#el-08-desktop", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 23.8);
        tl.fromTo("#el-09-outro", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 23.8);
        tl.to({}, { duration: 27.8 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
